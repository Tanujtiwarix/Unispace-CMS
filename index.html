<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unispace | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-box"><i class="ri-government-fill"></i></div>
                <div class="brand-info">
                    <strong>Unispace</strong>
                    <span>Classroom Manager</span>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="navigate('dashboard', this)"><i class="ri-layout-grid-fill"></i>
                    Dashboard</div>
                <div class="nav-item" onclick="navigate('attendance', this)"><i class="ri-checkbox-circle-line"></i>
                    Attendance</div>
                <div class="nav-item" onclick="navigate('timetable', this)"><i class="ri-calendar-event-line"></i>
                    Timetable</div>
                <div class="nav-item" onclick="navigate('map', this)"><i class="ri-map-2-line"></i> Map</div>
                <div class="nav-item" onclick="navigate('classrooms', this)"><i class="ri-door-open-line"></i>
                    Classrooms</div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-pill">
                    <div class="user-img"><i class="ri-user-line"></i></div>
                    <span>Student</span>
                    <i class="ri-logout-box-r-line logout-btn"></i>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 id="dynamic-greeting">Loading...</h1>
                <p class="header-subtext">
                    <span id="live-date"></span> •
                    <span id="live-clock"></span> •
                    <span>B.Tech CSE 1st Year</span>
                </p>
            </header>

            <div id="page-content">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
