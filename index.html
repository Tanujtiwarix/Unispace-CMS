<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unispace | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --student-primary: #2563eb;
            --faculty-primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text: #334155;
            /* Default to Student Theme */
            --current-accent: var(--student-primary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e2e8f0 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .logo-box {
            background: var(--current-accent);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 20px;
            transition: 0.3s;
        }

        h2 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
        }

        /* Role Switcher */
        .role-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            background: transparent;
            color: #64748b;
            transition: 0.3s;
        }

        .role-btn.active {
            background: white;
            color: var(--current-accent);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Form Styling */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: var(--current-accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Faculty focus specific shadow */
        .faculty-focus:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--current-accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer-links a {
            color: var(--current-accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand">
            <div class="logo-box" id="logoBox"><i class="ri-government-fill"></i></div>
            <strong style="font-size: 20px; letter-spacing: -0.5px;">Unispace</strong>
        </div>

        <h2 id="loginTitle">Student Login</h2>
        <p id="loginSub">Enter your credentials to access the portal</p>

        <div class="role-switcher">
            <button class="role-btn active" id="btnStudent" onclick="setRole('student')">Student</button>
            <button class="role-btn" id="btnFaculty" onclick="setRole('faculty')">Faculty</button>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label id="userLabel">Student ID</label>
                <input type="text" class="input-field" placeholder="e.g. 2026CS101" required id="userInput">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" class="input-field" placeholder="••••••••" required id="passwordInput">
            </div>

            <button type="submit" class="login-btn">Login to Portal</button>
        </form>
    </div>

    <script>
        let currentRole = 'student';

        function setRole(role) {
            currentRole = role;

            // Get Elements
            const root = document.documentElement;
            const logoBox = document.getElementById('logoBox');
            const btnStudent = document.getElementById('btnStudent');
            const btnFaculty = document.getElementById('btnFaculty');
            const loginTitle = document.getElementById('loginTitle');
            const userLabel = document.getElementById('userLabel');
            const userInput = document.getElementById('userInput');

            // Reset States
            btnStudent.classList.remove('active');
            btnFaculty.classList.remove('active');

            if (role === 'student') {
                btnStudent.classList.add('active');
                root.style.setProperty('--current-accent', 'var(--student-primary)');
                loginTitle.innerText = "Student Login";
                userLabel.innerText = "Student ID";
                userInput.placeholder = "e.g. 2026CS101";
                userInput.classList.remove('faculty-focus');
            } else {
                btnFaculty.classList.add('active');
                root.style.setProperty('--current-accent', 'var(--faculty-primary)');
                loginTitle.innerText = "Faculty Login";
                userLabel.innerText = "Faculty Employee Code";
                userInput.placeholder = "e.g. FAC8821";
                userInput.classList.add('faculty-focus');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();

            const id = document.getElementById('userInput').value;
            const password = document.getElementById('passwordInput').value;

            try {
                let url = '';

                // Decide endpoint based on role
                if (currentRole === 'faculty') {
                    url = '/faclogin';
                } else {
                    url = '/login';
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id,
                        password,
                        role: currentRole
                    })
                });

                const data = await res.json();

                if (data.success) {

                    // STUDENT
                    if (currentRole === 'student' || currentRole === 'student-register') {
                        localStorage.setItem('rollno', id);
                        localStorage.setItem('name', data.name);
                        localStorage.setItem('section', data.section);
                        localStorage.setItem('role', currentRole);

                        window.location.href = "/student";
                    }

                    // FACULTY
                    else if (currentRole === 'faculty') {
                        localStorage.setItem('rollno', id);
                        localStorage.setItem('name', data.name);
                        localStorage.setItem('role', currentRole);

                        window.location.href = "/faculty";
                    }

                } else {
                    alert("Invalid Credentials");
                }

            } catch (err) {
                console.error(err);
                alert("Server error");
            }
        }

    </script>
</body>

</html>
